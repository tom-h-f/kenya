# Collection targets for the 2027 Kenyan election monitor.
# Handles verified against a live run (2026-07-04). Keywords tuned from a 1,255-tweet
# sample: dropped AFCON-noisy "Kenya 2027", plus "Raila 2027" (Raila d. 15 Oct 2025)
# and defunct "Azimio". Refine iteratively.

x:
  accounts:
    # Principals / presidential-tier
    - WilliamsRuto        # President William Ruto (incumbent, UDA/Kenya Kwanza)
    - rigathi             # Rigathi Gachagua (DCP, "Wamunyoro", ex-DP)
    - skmusyoka           # Kalonzo Musyoka (Wiper, United Opposition)
    - MusaliaMudavadi     # Musalia Mudavadi (Prime CS)
    - RealMatiangi        # Fred Matiang'i (active handle; FredMatiangi is dormant)
    - MarthaKarua         # Martha Karua (PLP)
    - dkmaraga            # David Maraga (former CJ, UGM)
    - HonJBMuturi         # Justin Muturi (DP)
    - HonWetangula        # Moses Wetang'ula (Ford Kenya, Speaker, pro-Ruto)
    - edwinsifuna         # Edwin Sifuna (ODM SG, "Linda Mwananchi")
    - Honcalebamisi       # Caleb Amisi (opposition MP)
    - MigunaMiguna        # Miguna Miguna (declared candidate)
    - OkiyaOmtatah        # Okiya Omtatah (Senator, activist)
    - kipmurkomen         # Kipchumba Murkomen (Interior CS)
    - OleItumbi           # Dennis Itumbi (Ruto digital strategist)
    # Parties / coalitions
    - TheODMparty         # ODM (post-Raila succession)
    - UDAKenya            # UDA (ruling party)
    - DCP_Democracy       # Democracy for the Citizens Party (Gachagua)
    # Institutions
    - IEBCKenya           # Electoral commission
    - InteriorKE          # Ministry of Interior
    - DCI_Kenya           # Directorate of Criminal Investigations
    # Media
    - NationAfrica
    - StandardKenya
    - citizentvkenya
    - KTNNewsKE
    - ntvkenya
    # Commentariat / influencers
    - gabrieloguda        # high-engagement political commentator
